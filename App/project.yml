name: GainForge
options:
  bundleIdPrefix: com.gainforge
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  # 同一リポジトリ内の Swift Package（Core）をローカル参照する。
  GainForge:
    path: ..

targets:
  GainForge:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: GainForge
        product: GainForgeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gainforge.app
        PRODUCT_NAME: GainForge
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.photography
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # ローカルツールのため App Sandbox は無効（入力隣への .heic 書き出しを許可）。
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - GainForgeAppTests

  GainForgeAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: GainForge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.gainforge.app.tests
